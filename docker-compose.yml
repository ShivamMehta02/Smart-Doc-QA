version: '3.8'

services:
  # ── API Server ───────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - faiss_data:/app/data/faiss
    env_file:
      - .env
    depends_on:
      - db
      - redis
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ── Background Worker ────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    volumes:
      - .:/app
      - faiss_data:/app/data/faiss
    env_file:
      - .env
    depends_on:
      - redis
      - db
    command: celery -A app.workers.celery_app worker --loglevel=info -Q documents

  # ── Database ─────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=docqa
    ports:
      - "5432:5432"

  # ── Cache & Message Broker ───────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
  faiss_data:
  redis_data:
