<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart-Doc-QA | Testing Dashboard</title>
    <style>
        :root {
            --bg: #050810;
            --surface: #0f172a;
            --blue: #3b82f6;
            --green: #10b981;
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
        }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            height: 100vh;
        }
        /* SIDEBAR */
        .sidebar {
            width: 320px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }
        .logo { font-size: 1.25rem; font-weight: 800; color: var(--blue); }
        .upload-zone {
            border: 2px dashed var(--border);
            border-radius: 12px;
            padding: 32px 16px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .upload-zone:hover { border-color: var(--blue); background: rgba(59, 130, 246, 0.05); }
        .btn {
            background: var(--blue);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }
        .job-card {
            background: rgba(255,255,255,0.03);
            padding: 16px;
            border-radius: 8px;
            font-size: 0.85rem;
        }
        .progress-bar {
            height: 6px;
            background: #1e293b;
            border-radius: 3px;
            margin-top: 8px;
            overflow: hidden;
        }
        .progress-fill { height: 100%; background: var(--green); width: 0%; transition: width 0.5s ease; }

        /* CHAT AREA */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 40px;
            max-width: 800px;
            margin: 0 auto;
        }
        #chat-messages {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding-bottom: 20px;
        }
        .message { padding: 16px; border-radius: 12px; max-width: 85%; line-height: 1.5; }
        .message.user { align-self: flex-end; background: var(--blue); }
        .message.bot { align-self: flex-start; background: rgba(255,255,255,0.05); border: 1px solid var(--border); }
        .sources { font-size: 0.75rem; color: var(--text-muted); margin-top: 8px; }

        .input-area {
            display: flex;
            gap: 12px;
            background: var(--surface);
            padding: 16px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }
        input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            outline: none;
            font-size: 1rem;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo">Smart-Doc-QA</div>
        
        <div class="upload-section">
            <p style="font-size: 0.9rem; margin-bottom: 12px;">Step 1: Upload Document</p>
            <div class="upload-zone" onclick="document.getElementById('file-input').click()">
                <span id="file-label">Click to select PDF/DOCX</span>
                <input type="file" id="file-input" hidden onchange="handleFileSelect(event)">
            </div>
            <button class="btn" id="upload-btn" style="margin-top: 12px;" disabled onclick="uploadFile()">Upload & Process</button>
        </div>

        <div id="job-status" style="display: none;">
            <div class="job-card">
                <div style="display: flex; justify-content: space-between;">
                    <span>Processing...</span>
                    <span id="progress-text">0%</span>
                </div>
                <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
                <p id="doc-id-display" style="font-size: 0.7rem; color: var(--text-muted); margin-top: 8px;"></p>
            </div>
        </div>

        <div class="info-section" style="margin-top: auto; font-size: 0.8rem; color: var(--text-muted);">
            Status: <span id="api-status">Connecting...</span>
        </div>
    </div>

    <div class="chat-container">
        <div id="chat-messages">
            <div class="message bot">
                Hello! Upload a document on the left to start asking questions. I can handle follow-ups too.
            </div>
        </div>
        <div class="input-area">
            <input type="text" id="query-input" placeholder="Ask a question..." onkeypress="if(event.key==='Enter') sendQuery()">
            <button class="btn" style="width: auto; padding: 0 24px;" onclick="sendQuery()">Send</button>
        </div>
    </div>

    <script>
        const API_BASE = "http://localhost:8000/api/v1";
        let currentDocId = null;
        let conversationId = null;
        let selectedFile = null;

        // 1. Health Check
        async function checkHealth() {
            try {
                const res = await fetch("http://localhost:8000/health");
                if (res.ok) document.getElementById('api-status').innerText = "Online 🟢";
            } catch (e) {
                document.getElementById('api-status').innerText = "Offline 🔴 (Start Docker!)";
            }
        }
        setInterval(checkHealth, 3000);
        checkHealth();

        // 2. Handle Upload
        function handleFileSelect(e) {
            selectedFile = e.target.files[0];
            document.getElementById('file-label').innerText = selectedFile.name;
            document.getElementById('upload-btn').disabled = false;
        }

        async function uploadFile() {
            const formData = new FormData();
            formData.append('file', selectedFile);

            document.getElementById('upload-btn').disabled = true;
            document.getElementById('job-status').style.display = 'block';

            try {
                const res = await fetch(`${API_BASE}/documents/upload`, { method: 'POST', body: formData });
                const data = await res.json();
                if (data.job_id) {
                    currentDocId = data.doc_id;
                    pollStatus(data.job_id);
                }
            } catch (e) {
                alert("Upload failed. Make sure API is running.");
            }
        }

        // 3. Poll Status
        async function pollStatus(jobId) {
            const interval = setInterval(async () => {
                const res = await fetch(`${API_BASE}/jobs/${jobId}/status`);
                const data = await res.json();
                
                document.getElementById('progress-text').innerText = `${data.progress}%`;
                document.getElementById('progress-fill').style.width = `${data.progress}%`;

                if (data.status === 'done') {
                    clearInterval(interval);
                    document.getElementById('progress-text').innerText = "Ready!";
                    document.getElementById('doc-id-display').innerText = `Doc ID: ${currentDocId}`;
                } else if (data.status === 'failed') {
                    clearInterval(interval);
                    alert("Processing failed: " + data.error_msg);
                }
            }, 2000);
        }

        // 4. Send Query
        async function sendQuery() {
            const input = document.getElementById('query-input');
            const question = input.value.trim();
            if (!question || !currentDocId) return;

            // Add user message
            addMessage(question, 'user');
            input.value = '';

            try {
                const endpoint = conversationId ? `/documents/${currentDocId}/chat` : `/documents/${currentDocId}/query`;
                const payload = { question };
                if (conversationId) payload.conversation_id = conversationId;

                const res = await fetch(`${API_BASE}${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();

                if (data.conversation_id) conversationId = data.conversation_id;
                
                addMessage(data.answer, 'bot', data.sources, data.confidence);
            } catch (e) {
                addMessage("Error: Could not reach the API.", 'bot');
            }
        }

        function addMessage(text, role, sources = [], confidence = null) {
            const container = document.getElementById('chat-messages');
            const div = document.createElement('div');
            div.className = `message ${role}`;
            
            let html = `<div>${text}</div>`;
            if (role === 'bot' && confidence) {
                html += `<div class="sources">Confidence: ${Math.round(confidence * 100)}%</div>`;
            }
            if (sources.length > 0) {
                html += `<div class="sources">Sources: ${sources.map(s => `Page ${s.page}`).join(', ')}</div>`;
            }
            
            div.innerHTML = html;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }
    </script>
</body>
</html>
